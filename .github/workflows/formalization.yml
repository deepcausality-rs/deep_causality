# Formalization CI — the L1 (Lean) gate and the Lean<->Rust traceability check.
# See lean/README.md and openspec/notes/causal-algebra/Formalization.md.
#
# Both gates run on every PR/push (fast). Kani (L3, bounded model checking) is NOT run in CI:
# a full run took ~2h and the project cannot foot that CI bill. The Kani harnesses in
# deep_causality_core/tests/kani_proofs.rs remain and can be run locally on demand
# (`cargo kani --tests -p deep_causality_core`).

name: Formalization

on:
  pull_request:
  push:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # The mathematical truth. A broken law fails `lake build`.
  lean:
    name: lean (lake build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lean
    steps:
      - uses: actions/checkout@v7
      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain "$(cat lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: lake exe cache get
        run: lake exe cache get || true
      - name: lake build
        run: lake build

  # No unproven placeholders. Our proof files must be zero-sorry; the only whitelisted slots are the
  # QCM obligation stubs under DeepCausalityFormal/Quantum/ (which land with deep_causality_quantum).
  # The guard is scoped to our own proofs — never the vendored Mathlib under lean/.lake/.
  sorry-guard:
    name: no sorry outside Quantum obligations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Fail if a bare sorry appears outside the whitelisted Quantum/ obligation slots
        run: |
          set -euo pipefail
          # Word-boundaried, lowercase `sorry` token: `sorryAx` / `isSyntheticSorry` do NOT match.
          # Whitelist: DeepCausalityFormal/Quantum/ (deferred QCM obligations). Proof prose must not
          # use the bare token — write "unproven placeholder" instead — or the guard trips.
          hits=$(grep -rnw 'sorry' lean/DeepCausalityFormal --include='*.lean' \
                 | grep -v '/Quantum/' || true)
          if [ -n "$hits" ]; then
            echo "Found a bare sorry outside the whitelisted Quantum/ obligation slots:"
            echo "$hits"
            exit 1
          fi
          echo "OK: zero sorry outside the Quantum/ obligation slots."

  # The bridge — every THEOREM_MAP id must appear in both a Lean file and a Rust file.
  theorem-map:
    name: theorem-map consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Every proved Lean theorem needs a Rust witness and a manifest entry
        run: |
          set -euo pipefail
          # Source of truth: the `THEOREM_MAP: `id`` tags in the Lean proofs.
          ids=$(grep -rhoE 'THEOREM_MAP: `[a-z0-9_.]+`' lean --include='*.lean' \
                | sed -E 's/.*`([a-z0-9_.]+)`.*/\1/' | sort -u || true)
          if [ -z "$ids" ]; then echo "no THEOREM_MAP ids found in lean/**/*.lean"; exit 1; fi
          fail=0
          for id in $ids; do
            rust_hit=$(grep -Frl "THEOREM_MAP: $id" \
                       deep_causality_algebra deep_causality_num deep_causality_num_complex \
                       deep_causality_num_dual deep_causality_core deep_causality_haft \
                       deep_causality_topology deep_causality \
                       --include='*.rs' || true)
            map_hit=$(grep -Fl "$id" lean/THEOREM_MAP.md || true)
            if [ -z "$rust_hit" ]; then echo "MISSING Rust witness for id: $id"; fail=1; fi
            if [ -z "$map_hit" ]; then echo "MISSING THEOREM_MAP.md entry for id: $id"; fail=1; fi
          done
          exit $fail
