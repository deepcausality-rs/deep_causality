# Executes the `deep_causality_cfd/verification/` harnesses.
#
# `cargo test` COMPILES these binaries (they are `[[example]]` targets) but never runs them, so
# until this workflow existed every quantitative accuracy claim in the crate README and in
# verification/README.md was unenforced. Each harness self-verifies and exits non-zero on a broken
# gate, so running it is the whole check — no extra assertions live here.
#
# Split by cost: the fast harnesses gate every pull request; the slow ones run nightly.
# `verification-suite-complete` fails if a harness is declared in Cargo.toml but listed in neither
# set, so a newly added harness cannot silently never run.
#
# KNOWN-FAILING (expected red, tracked): `qtt_cylinder_verification` exits 1 on its eta and mask
# smoothing ladders. This is a correct result, not a regression — the Brinkman penalization drag has
# no demonstrated eta -> 0 limit at this configuration, and the reported C_d scales 6.1x with the
# mask smoothing width (a purely numerical parameter). Measured:
#
#   eta 0.128 -> 0.008 : C_d 17.39, 24.02, 26.25, 23.76, 21.40  (rises, peaks, falls: no limit)
#   smoothing 0.5 -> 4 : C_d  7.70, 12.33, 23.76, 35.81, 47.27  (6.1x on a discretization choice)
#
# Root cause: the physical Brinkman layer sqrt(eta*nu) = 0.144*dx is ~7x thinner than one cell, so
# the grid resolves the mask smoothing skirt instead of the penalization layer. The resolution
# criterion eta >= dx^2/nu = 0.771 is violated 48x by the configured eta = 0.016.
#
# Resolving it is a solver + cost change (choose eta from a wall-error target, refine to resolve the
# layer) and belongs to Phase 2 of openspec/notes/cfd_audit/AUDIT-REPORT.md section 9, item 10. It is
# gated rather than silenced deliberately: widening the bound until it passes is the back-fitting
# this whole change exists to remove. It runs nightly rather than per-PR so a known-open physics
# finding does not block merges.

name: CFD Verification

on:
  pull_request:
  schedule:
    # 03:17 UTC daily. Off the hour to avoid the scheduler's peak-minute queue.
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Fast: measured at <= ~5 s each on the reference machine.
  FAST_HARNESSES: >-
    mms_taylor_green_verification
    dec_graded_mms_verification
    dec_wall_heat_flux_verification
    dec_taylor_green_re1600_verification
    qtt_taylor_green_verification
    qtt_park2t_blackout
    qtt_sod
    qtt_ramc_stagline
    qtt_blunt_body_2d
    qtt_reentry_3d
  # Slow: dec_cylinder ~510 s, dec_cylinder_wake ~155 s, dec_lid_cavity minutes-to-hours by grid,
  # qtt_cylinder ~37 s (see KNOWN-FAILING below).
  SLOW_HARNESSES: >-
    dec_cylinder_verification
    dec_cylinder_wake_verification
    dec_lid_cavity_re1000_verification
    qtt_cylinder_verification

jobs:
  # Guards the two lists above against drift from Cargo.toml. Cheap, so it runs on every trigger.
  verification-suite-complete:
    name: Every verification harness is scheduled
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Compare declared harnesses against the fast + slow lists
        run: |
          set -euo pipefail
          declared=$(python3 - <<'PY'
          import re
          t = open('deep_causality_cfd/Cargo.toml').read()
          for b in re.findall(r'\[\[example\]\]\s*\n((?:[a-z_-]+\s*=.*\n)+)', t):
              n = re.search(r'name\s*=\s*"([^"]+)"', b)
              p = re.search(r'path\s*=\s*"([^"]+)"', b)
              if n and p and p.group(1).startswith('verification/'):
                  print(n.group(1))
          PY
          )
          scheduled=$(printf '%s\n%s\n' "$FAST_HARNESSES" "$SLOW_HARNESSES" | tr ' ' '\n' | sed '/^$/d')

          missing=$(comm -23 <(sort <<<"$declared") <(sort <<<"$scheduled") || true)
          extra=$(comm -13 <(sort <<<"$declared") <(sort <<<"$scheduled") || true)

          if [ -n "$missing" ]; then
            echo "::error::Verification harness declared in Cargo.toml but scheduled in neither the fast nor the slow list:"
            echo "$missing"
          fi
          if [ -n "$extra" ]; then
            echo "::error::Scheduled harness that is not a declared verification example (renamed or removed?):"
            echo "$extra"
          fi
          if [ -n "$missing" ] || [ -n "$extra" ]; then
            echo "Update FAST_HARNESSES / SLOW_HARNESSES in .github/workflows/cfd_verification.yml"
            exit 1
          fi
          echo "All $(wc -l <<<"$declared") declared verification harnesses are scheduled."

  fast:
    name: Fast harnesses (pull request)
    # Skipped on the nightly schedule: the PR run already covers these.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v6
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache Cargo build
        uses: actions/cache@v6
        with:
          path: target
          key: ${{ runner.os }}-cargo-verification-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-verification-

      - name: Build verification harnesses
        run: cargo build --release -p deep_causality_cfd --examples

      - name: Run fast verification harnesses
        run: |
          set -uo pipefail
          failed=""
          for h in $FAST_HARNESSES; do
            echo "::group::$h"
            start=$(date +%s)
            if cargo run --release -q -p deep_causality_cfd --example "$h"; then
              echo "PASS $h ($(( $(date +%s) - start ))s)"
            else
              rc=$?
              echo "::error::verification harness '$h' exited $rc"
              failed="$failed $h"
            fi
            echo "::endgroup::"
          done
          if [ -n "$failed" ]; then
            echo "::error::Failing verification harnesses:$failed"
            exit 1
          fi
          echo "All fast verification harnesses passed."

  slow:
    name: Slow harnesses (nightly)
    # Nightly and manual only — ~12 min, dominated by dec_cylinder. Never gates a pull request.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7

      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v6
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache Cargo build
        uses: actions/cache@v6
        with:
          path: target
          key: ${{ runner.os }}-cargo-verification-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-verification-

      - name: Build verification harnesses
        run: cargo build --release -p deep_causality_cfd --examples

      - name: Run slow verification harnesses
        run: |
          set -uo pipefail
          failed=""
          for h in $SLOW_HARNESSES; do
            echo "::group::$h"
            start=$(date +%s)
            if cargo run --release -q -p deep_causality_cfd --example "$h"; then
              echo "PASS $h ($(( $(date +%s) - start ))s)"
            else
              rc=$?
              echo "::error::verification harness '$h' exited $rc"
              failed="$failed $h"
            fi
            echo "::endgroup::"
          done
          if [ -n "$failed" ]; then
            echo "::error::Failing verification harnesses:$failed"
            exit 1
          fi
          echo "All slow verification harnesses passed."
