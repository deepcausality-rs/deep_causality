# release-plz creates a pull request with the new versions, where it prepares the next release.
# release-plz releases the unpublished packages.
# https://release-plz.ieni.dev/docs/github

name: Release-plz

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - main

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 #  necessary to determine the next version and build the changelog.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        env:
          # A non-default token (fine-grained PAT owned by the repo owner) is required so the
          # release PR is authored by a trusted identity. PRs opened by the default GITHUB_TOKEN
          # (github-actions[bot]) have their CI runs held in the "action_required" state, awaiting
          # manual approval under the first-time-contributor policy. See release-plz.dev token docs.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}