[package]
name = "deep_causality_multivector"
version = "0.5.4"
edition = { workspace = true }
rust-version = { workspace = true }
license = { workspace = true }

repository = "https://github.com/deepcausality/deep_causality.rs"
authors = ["Marvin Hansen <marvin.hansen@gmail.com>"]
description = "Multivector and MultiField implementation for DeepCausality"
documentation = "https://docs.rs/deep_causality"
categories = ["data-structures", "science", "mathematics"]
keywords = ["data-structures", "vector"]
# Exclude all bazel files as these conflict with Bazel workspace when vendored.
exclude = [
    "*.bazel",
    "*/*.bazel",
    "*.bazel.*",
    "BUILD",
    "BUILD.bazel",
    "MODULE.bazel",
    ".bazelignore",
    ".bazelrc",
    "tests/**/*",
    "papers/*",
]

[dependencies.deep_causality_haft]
path = "../deep_causality_haft"
version = "0.4"


[dependencies.deep_causality_num]
path = "../deep_causality_num"
version = "0.4"

[dependencies.deep_causality_algebra]
path = "../deep_causality_algebra"
version = "0.2"

[dependencies.deep_causality_num_complex]
path = "../deep_causality_num_complex"
version = "0.1"


[dependencies.deep_causality_tensor]
path = "../deep_causality_tensor"
version = "0.5"

[dependencies.deep_causality_metric]
path = "../deep_causality_metric"
version = "0.2"


[dev-dependencies]
criterion = { version = "0.8" }

[[bench]]
name = "multivector_bench"
harness = false

[[bench]]
name = "multifield_bench"
harness = false



[lints.rust]
# Exempt from the workspace `unsafe_code = "forbid"` policy.
# HKT fmap pointer-cast (rustc type-equality limitation) in hkt_multifield. Remove when the compiler limitation is resolved.
unsafe_code = "allow"
