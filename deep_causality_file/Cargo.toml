[package]
name = "deep_causality_file"
version = "0.1.3"
edition = { workspace = true }
rust-version = { workspace = true }
license = { workspace = true }
repository = "https://github.com/deepcausality/deep_causality.rs"
authors = ["Marvin Hansen <marvin.hansen@gmail.com>"]
description = "File and receiver-data (RINEX GNSS SP3/CLK) loaders over the haft IO monad for DeepCausality"
documentation = "https://docs.rs/deep_causality_file"
categories = ["science", "filesystem"]
keywords = ["gnss", "rinex", "sp3", "io", "deep-causality"]
# Exclude all bazel files as these conflict with Bazel workspace when vendored.
exclude = [
    "*.bazel",
    "*/*.bazel",
    "*.bazel.*",
    "BUILD",
    "BUILD.bazel",
    "MODULE.bazel",
    ".bazelignore",
    ".bazelrc",
    "tests/**/*",
    "papers/*",
]

[dependencies.deep_causality_haft]
path = "../deep_causality_haft"
version = "0.4"

[dependencies.deep_causality_num]
path = "../deep_causality_num"
version = "0.4"

[dependencies.deep_causality_algebra]
path = "../deep_causality_algebra"
version = "0.2"

[dependencies]
# External dependencies
chrono = { version = "0.4" }

[dev-dependencies]
tempfile = { version = "3", default-features = false }

[lints]
workspace = true
