[package]
name = "deep_causality_sparse"
version = "0.2.2"
edition = { workspace = true }
rust-version = { workspace = true }
license = { workspace = true }

repository = "https://github.com/deepcausality/deep_causality.rs"
authors = ["Marvin Hansen <marvin.hansen@gmail.com>"]
description = "Spare matrix data structure for for deep_causality crate."
documentation = "https://docs.rs/deep_causality"
categories = ["data-structures", "science"]
keywords = ["data-structures", "sparse-matrix", "csr"]
exclude = [
    "*.bazel",
    "*/*.bazel",
    "*.bazel.*",
    "BUILD",
    "BUILD.bazel",
    "MODULE.bazel",
    ".bazelignore",
    ".bazelrc",
    "tests/**/*",
    "papers/*",
]

[features]
default = ["std"]
std = ["deep_causality_num/default", "deep_causality_algebra/default"]
# Opt-in: enables CausalTensor <-> CsrMatrix iso (forward `From`,
# reverse Tier 2 `Iso`, inherent `to_dense()` alias). Pulls in
# `deep_causality_tensor` as a transitive dependency. Off by default
# so that downstream sparse users who don't need the iso don't pay
# the compile cost.
tensor-iso = ["dep:deep_causality_tensor"]

[dependencies.deep_causality_num]
path = "../deep_causality_num"
version = "0.4"
default-features = false

[dependencies.deep_causality_algebra]
path = "../deep_causality_algebra"
version = "0.2"
default-features = false

[dependencies.deep_causality_haft]
path = "../deep_causality_haft"
version = "0.4"

[dependencies.deep_causality_tensor]
path = "../deep_causality_tensor"
version = "0.5"
default-features = false
optional = true

[dev-dependencies]
criterion = { version = "0.8" }
deep_causality_rand = { path = "../deep_causality_rand" }

[[bench]]
name = "csr_matrix_benchmarks"
harness = false

[lints]
workspace = true
