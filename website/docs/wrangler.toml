# Cloudflare Workers + Static Assets config for the DeepCausality documentation.
#
# Standalone from the marketing site (website/web → "deepcausality-prod").
# This Worker serves the Starlight build at docs.deepcausality.com. A docs
# change rebuilds and deploys only this Worker; the marketing site is untouched.
#
# The site is fully static — no SSR, no API routes, no `main` worker entry.
# Wrangler uploads the contents of `dist/` as the Worker's static assets.
# Bind the custom domain (docs.deepcausality.com) in the Cloudflare dashboard.

name = "deepcausality-docs"
# Pin the target account explicitly: this credential is linked to two
# Cloudflare accounts, so without account_id wrangler may prompt or pick the
# wrong one. This is "Marvin.hansen@gmail.com's Account".
account_id = "222139bff18ce0390d15f59a78d3d6b2"
compatibility_date = "2026-05-01"

[assets]
directory = "./dist"
# src/content/docs/404.mdx builds to dist/404.html; let Cloudflare serve it on
# any unmatched path.
not_found_handling = "404-page"

[observability]
enabled = true
