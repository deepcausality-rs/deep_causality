allowBuilds:
  esbuild: true
  sharp: true
  workerd: true
# Fresh releases accepted despite the configured minimum release age.
# pnpm appends here on install; each entry is a version we chose to take early.
minimumReleaseAgeExclude:
  - astro@7.1.3

# pnpm settings live here, not in package.json.
#
# pnpm 11 no longer reads the `pnpm` field from package.json (it warns
# "The 'pnpm' field in package.json is no longer read by pnpm"). The
# build-script allowlist that lets these native deps run their install
# scripts must therefore be declared here. Without it, `pnpm install`
# aborts on Cloudflare with ERR_PNPM_IGNORED_BUILDS.
onlyBuiltDependencies:
  - esbuild
  - sharp
  - workerd

# Deduplicate @astrojs/markdown-satteri.
#
# @astrojs/markdown-remark peers "^0.3.1" while astro pins an exact patch, so
# pnpm legitimately resolves two copies. Bazel's public_hoist_packages cannot
# hoist an ambiguous name and fails the build:
#   "Invalid public hoist configuration with multiple packages to hoist"
# Force the single version astro requires; it also satisfies the ^0.3.1 peer.
#
# NOTE: overrides must live here. pnpm 11 no longer reads the `pnpm` field from
# package.json, so an override placed there is silently ignored.
overrides:
  '@astrojs/markdown-satteri': 0.3.4
