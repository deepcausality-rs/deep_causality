allowBuilds:
  esbuild: true
  sharp: true
  # Required so `wrangler deploy` can run its packaging step under pnpm 11.
  workerd: true

# Force-patch transitive deps that ship with known CVEs. Remove an entry
# once the parent dependency upstream bumps the pinned version.
overrides:
  devalue: ^5.8.1
  yaml: ^2.8.3
