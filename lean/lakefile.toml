#
# Lean 4 + Mathlib formalization of the DeepCausality Causal Algebra.
# This is a SEPARATE toolchain from the Rust workspace (see lean/README.md).
# The Lean version in `lean-toolchain` must match the Mathlib `rev` below; bump both together.

name = "DeepCausalityFormal"
defaultTargets = ["DeepCausalityFormal"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.32.0"

[[lean_lib]]
name = "DeepCausalityFormal"
